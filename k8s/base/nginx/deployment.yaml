apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: demo-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-custom-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: nginx-custom-page
          configMap:
            name: nginx-custom-page